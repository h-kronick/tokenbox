<!DOCTYPE html>
<html lang="en" data-theme="classic-amber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokenBox</title>
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/split-flap.css">
  <style>
    /* App-level layout */
    html, body {
      background: var(--background);
      width: 100%;
      height: 100%;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* Drag region: the entire background is draggable */
    [data-tauri-drag-region] {
      cursor: default;
    }
  </style>
</head>
<body data-tauri-drag-region>
  <div id="app" data-tauri-drag-region></div>

  <script type="module">
    import { initMainWindow } from './views/MainWindow.js';
    initMainWindow(document.getElementById('app'));
  </script>
</body>
</html>
